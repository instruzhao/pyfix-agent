model:
  provider: openai_compatible
  name: kimi-k2.6
  api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  api_key_env: DASHSCOPE_API_KEY
  temperature: 1.0
  max_tokens: 8192
  timeout_seconds: 120
  enable_thinking: true
  system_prompt_as_user: false

paths:
  workspace: workspaces/sklearn_iris_tree_project
  patch_output_dir: outputs/patches
  trace_output_dir: outputs/traces

trace:
  redaction_mode: paths

sandbox:
  timeout_seconds: 30

test:
  commands:
    - [python, -m, pytest, -p, no:cacheprovider]

safety:
  require_clean_workspace: true
  isolate_workspace: true
  allowed_paths: []
  max_changed_files: 8
  max_changed_lines: 400

context:
  strategy: traceback
  line_window: 25
  max_files: 6
  max_selected_tokens: 12000
  max_expansion_level: 2
  fallback_to_full_context: true
  include_tests: true

repository:
  enabled: true
  cache_dir: outputs/index
  max_files: 2000
  max_file_bytes: 1000000
  max_graph_depth: 2
  max_related_files: 6
  max_snippet_lines: 200

semantic_review:
  enabled: true
  max_semantic_revisions: 2
  max_parse_retries: 1
  max_output_tokens: 3072
  enable_thinking: true
  max_context_chars: 16000
  max_feedback_chars: 3000
  max_contracts: 3
  max_risks: 3

agent:
  task: "Fix the failing tests in workspaces/sklearn_iris_tree_project. Only modify files under ml_iris_tree/. Do not modify tests/. Use sklearn.datasets.load_iris, train a DecisionTreeClassifier, compute multiclass metrics, and save a matplotlib Agg confusion matrix image."
  initial_mode: replacement
  max_iterations: 5
