name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run tests
        run: pytest -m "not integration"

      - name: Verify installed commands
        run: |
          pyfixagent --version
          pyfixagent-benchmark --list

  validate-benchmarks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install benchmark dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[benchmark]"

      - name: Validate benchmark protocol
        run: pyfixagent-benchmark --validate

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Docker with the containerd image store
        uses: docker/setup-docker-action@v5
        with:
          daemon-config: |
            {
              "features": {
                "containerd-snapshotter": true
              }
            }

      - name: Install project
        run: pip install -e .

      - name: Build runner with supply-chain attestations
        run: |
          docker build --sbom=true --provenance=mode=max \
            -f containers/Dockerfile \
            -t pyfixagent-runner:0.7.1 .

      - name: Run real container and resource-policy tests
        env:
          RUN_DOCKER_TESTS: "1"
        run: pytest tests/test_bounded_process.py tests/test_container_sandbox.py -q

      - name: Reject application-layer Critical or High CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: pyfixagent-runner:0.7.1
          ignore-base: true
          only-severities: critical,high
          exit-code: true
